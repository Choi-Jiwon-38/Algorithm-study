name: 🗓️ 주차별 문제 자동 선정 & PR 생성

on:
  # 매주 월요일 오전 9시 (KST = UTC+9 → UTC 00:00)
  schedule:
    - cron: "0 0 * * 1"

  # 수동 실행 (테스트 & 긴급 재실행용)
  workflow_dispatch:

# 403 에러 방지: PR 생성에 필요한 권한 명시
permissions:
  contents: write
  pull-requests: write

jobs:
  weekly-automation:
    name: 문제 선정 & PR 생성
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Select problems & create PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python .github/scripts/select_problems.py
